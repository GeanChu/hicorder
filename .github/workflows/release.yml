name: release

# Dispara ao criar uma tag v* (ex.: git tag v0.1.0 && git push --tags),
# ou manualmente em Actions. Builda instaladores na nuvem (sem Kaspersky)
# e cria um Release em rascunho com os artefatos.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
          - platform: windows-latest
            target: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend deps
        run: npm ci

      # ffmpeg empacotado como resource (app self-contained).
      - name: Fetch ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName src-tauri/resources/ffmpeg.exe

      - name: Fetch ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          mkdir ffmpeg_tmp && tar -xf ffmpeg.tar.xz -C ffmpeg_tmp --strip-components=1
          cp ffmpeg_tmp/ffmpeg src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg

      - name: Fetch ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          curl -L https://evermeet.cx/ffmpeg/getrelease/zip -o ffmpeg.zip
          unzip -o ffmpeg.zip -d ffmpeg_tmp
          cp ffmpeg_tmp/ffmpeg src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hicorder ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
