name: release

# Dispara ao criar uma tag v* (ex.: git tag v0.1.0 && git push --tags),
# ou manualmente em Actions. Builda instaladores na nuvem (sem Kaspersky)
# e cria um Release em rascunho com os artefatos.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 tem Xcode 26 (SDK do macOS 26), exigido pela dep transitiva
          # apple-metal (via screencapturekit). O passo "Selecionar Xcode 26"
          # abaixo fixa esse Xcode antes do build. `extra-args` liga a feature
          # `macos-system-audio` só no macOS (captura do áudio do sistema).
          - platform: macos-15
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            extra-args: '--features macos-system-audio'
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
            extra-args: ''
          - platform: windows-latest
            target: ''
            rust-targets: ''
            extra-args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # apple-metal (via screencapturekit) compila Swift contra o SDK do macOS 26;
      # o Xcode default do runner é mais antigo e falta os simbolos (MTLResidencySet
      # etc.). Fixa o Xcode 26 mais novo disponivel antes de compilar.
      - name: Selecionar Xcode 26
        if: startsWith(matrix.platform, 'macos')
        run: |
          xc=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$xc" ]; then echo "Xcode 26 nao encontrado no runner"; exit 1; fi
          echo "usando $xc"
          sudo xcode-select -s "$xc/Contents/Developer"
          xcodebuild -version

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend deps
        run: npm ci

      # ffmpeg empacotado como resource (app self-contained).
      # ffmpeg empacotado como resource (app self-contained). Baixa de um mirror
      # confiavel no GitHub (BtbN) como primario; cai para o host antigo se
      # preciso; ate 3 tentativas por URL. Hosts unicos costumavam derrubar o
      # build (503/timeout) e deixar a release so com macOS.
      - name: Fetch ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Get-Mirror($urls, $out) {
            foreach ($u in $urls) {
              for ($i = 1; $i -le 3; $i++) {
                try {
                  Invoke-WebRequest -Uri $u -OutFile $out -TimeoutSec 180
                  Write-Host "baixou de $u"
                  return
                } catch { Write-Host "falha $u (tentativa $i): $_"; Start-Sleep 5 }
              }
            }
            throw "nao baixou ffmpeg de nenhum mirror"
          }
          Get-Mirror @(
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-7.1.zip",
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip",
            "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          ) "ffmpeg.zip"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName src-tauri/resources/ffmpeg.exe
          # Garante os encoders usados (record + export). Falha cedo se faltar.
          $enc = & src-tauri/resources/ffmpeg.exe -hide_banner -encoders
          foreach ($c in @('libopus','libmp3lame')) {
            if (-not ($enc | Select-String $c)) { throw "ffmpeg sem encoder $c" }
          }

      - name: Fetch ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -e
          dl() {
            for u in "$@"; do
              for i in 1 2 3; do
                if curl -fL --connect-timeout 30 --max-time 300 "$u" -o ffmpeg_dl; then
                  echo "baixou de $u"; return 0
                fi
                echo "falha $u (tentativa $i)"; sleep 5
              done
            done
            echo "nao baixou ffmpeg de nenhum mirror"; exit 1
          }
          dl "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linux64-gpl-7.1.tar.xz" \
             "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
             "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir ffmpeg_tmp && tar -xf ffmpeg_dl -C ffmpeg_tmp
          bin=$(find ffmpeg_tmp -type f -name ffmpeg | head -1)
          cp "$bin" src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg
          for c in libopus libmp3lame; do \
            src-tauri/resources/ffmpeg -hide_banner -encoders | grep -q "$c" || { echo "ffmpeg sem encoder $c"; exit 1; }; \
          done

      - name: Fetch ffmpeg (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          set -e
          for i in 1 2 3; do
            if curl -fL --connect-timeout 30 --max-time 300 https://evermeet.cx/ffmpeg/getrelease/zip -o ffmpeg.zip; then
              echo "baixou ffmpeg"; break
            fi
            echo "falha ao baixar ffmpeg (tentativa $i)"; sleep 5
            [ "$i" = 3 ] && { echo "nao baixou ffmpeg"; exit 1; }
          done
          unzip -o ffmpeg.zip -d ffmpeg_tmp
          cp ffmpeg_tmp/ffmpeg src-tauri/resources/ffmpeg
          chmod +x src-tauri/resources/ffmpeg
          for c in libopus libmp3lame; do \
            src-tauri/resources/ffmpeg -hide_banner -encoders | grep -q "$c" || { echo "ffmpeg sem encoder $c"; exit 1; }; \
          done

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assinatura das atualizações (updater) — separada do SignPath.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hicorder ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          # Gera e anexa o latest.json (manifesto do updater) ao release.
          includeUpdaterJson: true
          args: ${{ format('{0} {1}', matrix.target && format('--target {0}', matrix.target) || '', matrix.extra-args) }}
